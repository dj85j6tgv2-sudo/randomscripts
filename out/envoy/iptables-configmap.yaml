apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-iptables-init
  namespace: myapp
  labels:
    managed-by: egress-generator
data:
  iptables-init.sh: "#!/bin/sh\n# iptables-init.sh — egress interception for Envoy\
    \ sidecar\n# Generated by the egress generator (allowlist-agnostic; CIDRs injected\
    \ at runtime).\n#\n# Required env vars (inject via Kubernetes Downward API / deployment\
    \ env):\n#   POD_CIDR     — pod network CIDR (default: 10.244.0.0/16)\n#   SERVICE_CIDR\
    \ — service cluster CIDR (default: 10.96.0.0/12)\n#   HOST_IP      — node IP (from\
    \ status.hostIP via fieldRef)\n#\nset -e\n\nPOD_CIDR=\"${POD_CIDR:-10.244.0.0/16}\"\
    \nSERVICE_CIDR=\"${SERVICE_CIDR:-10.96.0.0/12}\"\n\n# Create custom chain for\
    \ egress redirection\niptables -t nat -N ENVOY_EGRESS 2>/dev/null || true\n\n\
    # Skip traffic from Envoy itself (UID 1337)\niptables -t nat -A ENVOY_EGRESS -m\
    \ owner --uid-owner 1337 -j RETURN\n\n# Skip loopback — includes HTTP_PROXY traffic\
    \ going to 127.0.0.1:15000\niptables -t nat -A ENVOY_EGRESS -d 127.0.0.0/8 -j\
    \ RETURN\n\n# Skip link-local (AWS metadata, GCP metadata, etc.)\niptables -t\
    \ nat -A ENVOY_EGRESS -d 169.254.0.0/16 -j RETURN\n\n# Skip Envoy management ports\n\
    iptables -t nat -A ENVOY_EGRESS -p tcp --dport 15000 -j RETURN\niptables -t nat\
    \ -A ENVOY_EGRESS -p tcp --dport 15001 -j RETURN\niptables -t nat -A ENVOY_EGRESS\
    \ -p tcp --dport 9901  -j RETURN\n\n# Skip pod CIDR (intra-cluster pod traffic\
    \ is handled by NetworkPolicy, not Envoy)\niptables -t nat -A ENVOY_EGRESS -d\
    \ \"${POD_CIDR}\" -j RETURN\n\n# Skip service CIDR (kube-proxy handles service\
    \ VIPs via its own nat rules)\niptables -t nat -A ENVOY_EGRESS -d \"${SERVICE_CIDR}\"\
    \ -j RETURN\n\n# Skip node IP (health checks, kubelet API, host-networked services)\n\
    if [ -n \"${HOST_IP}\" ]; then\n  iptables -t nat -A ENVOY_EGRESS -d \"${HOST_IP}/32\"\
    \ -j RETURN\nfi\n\n# Skip UDP DNS (CoreDNS must be reachable for runtime hostname\
    \ resolution)\niptables -t nat -A ENVOY_EGRESS -p udp --dport 53 -j RETURN\n\n\
    # Redirect all remaining TCP egress to Envoy transparent proxy\niptables -t nat\
    \ -A ENVOY_EGRESS -p tcp -j REDIRECT --to-ports 15001\n\n# Apply chain to OUTPUT\
    \ (covers all outbound traffic from this pod's net namespace)\niptables -t nat\
    \ -A OUTPUT -p tcp -j ENVOY_EGRESS\n\necho \"ENVOY_EGRESS iptables chain configured.\"\
    \niptables -t nat -L ENVOY_EGRESS -n -v\n"

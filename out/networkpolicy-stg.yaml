apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: python-app-egress
  namespace: python-app-stg
spec:
  selector: app == "python-app"
  types:
  - Egress
  egress:
  # DNS (CoreDNS)
  - action: Allow
    protocol: UDP
    destination:
      ports:
      - 53
  # DNS (CoreDNS)
  - action: Allow
    protocol: TCP
    destination:
      ports:
      - 53
  # Redis cluster - STG
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 10.50.200.10/32
      ports:
      - 30000:30999
  # Payment gateway mTLS
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 127.0.0.1/32
      ports:
      - 8443
  # GitHub APIs
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 140.82.116.6/32
      - 185.199.108.133/32
      - 185.199.109.133/32
      - 185.199.110.133/32
      - 185.199.111.133/32
      ports:
      - 443
  # PostgreSQL database - STG
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 172.16.10.5/32
      ports:
      - 5432
  # Partner API - Staging
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 54.237.57.21/32
      ports:
      - 443
  # default deny
  - action: Deny

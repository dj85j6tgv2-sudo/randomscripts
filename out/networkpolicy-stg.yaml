apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: myapp-egress
  namespace: myapp-stg
  annotations:
    egress.policy/rules: 'api.github.com [140.82.121.5], raw.githubusercontent.com
      [185.199.108.133, 185.199.109.133, 185.199.110.133, 185.199.111.133], gist.githubusercontent.com
      [185.199.108.133, 185.199.109.133, 185.199.110.133, 185.199.111.133]:443 - GitHub
      APIs

      internal-api-stg.corp.local:80 - Internal REST API - STG

      partner-api-staging.external.com [54.237.57.21]:443 - Partner API - Staging

      *.monitoring.internal:443 - All monitoring subdomains (Grafana, Prometheus,
      etc)

      redis-stg-1.internal, redis-stg-2.internal, 10.50.200.10:30000-30999 - Redis
      cluster - STG

      kafka-stg.internal.corp:9093 - Kafka cluster - STG

      prometheus.monitoring.internal:9090 - Prometheus metrics endpoint

      jaeger-collector.tracing.internal:14250 - Jaeger tracing collector

      172.16.10.5:5432 - PostgreSQL database - STG

      dagster-code-server.dagster.svc.cluster.local:4266 - Dagster code server gRPC
      - DEV/STG

      jaeger-collector.tracing.internal:14250 - Jaeger tracing collector gRPC

      payment-gateway.partner.com [127.0.0.1]:8443 - Payment gateway mTLS'
spec:
  podSelector:
    matchLabels:
      app: myapp
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
  - ports:
    - port: 53
      protocol: TCP
  # GitHub APIs
  - to:
    - ipBlock:
        cidr: 140.82.121.5/32
    - ipBlock:
        cidr: 185.199.108.133/32
    - ipBlock:
        cidr: 185.199.109.133/32
    - ipBlock:
        cidr: 185.199.110.133/32
    - ipBlock:
        cidr: 185.199.111.133/32
    ports:
    - port: 443
      protocol: TCP
  # Partner API - Staging
  - to:
    - ipBlock:
        cidr: 54.237.57.21/32
    ports:
    - port: 443
      protocol: TCP
  # Redis cluster - STG
  - to:
    - ipBlock:
        cidr: 10.50.200.10/32
    ports:
    - port: 30000
      endPort: 30999
      protocol: TCP
  # PostgreSQL database - STG
  - to:
    - ipBlock:
        cidr: 172.16.10.5/32
    ports:
    - port: 5432
      protocol: TCP
  # Payment gateway mTLS
  - to:
    - ipBlock:
        cidr: 127.0.0.1/32
    ports:
    - port: 8443
      protocol: TCP

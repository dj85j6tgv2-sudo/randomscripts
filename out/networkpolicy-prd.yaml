apiVersion: crd.projectcalico.org/v1
kind: NetworkPolicy
metadata:
  name: python-app-egress
  namespace: python-app-prd
spec:
  selector: app == "python-app"
  types:
  - Egress
  egress:
  # DNS (CoreDNS)
  - action: Allow
    protocol: UDP
    destination:
      ports:
      - 53
  # DNS (CoreDNS)
  - action: Allow
    protocol: TCP
    destination:
      ports:
      - 53
  # Kafka brokers subnet - PRD
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 10.20.30.0/24
      ports:
      - 9092
  # Redis cluster - PRD (HA)
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 10.50.250.25/32
      - 10.50.250.26/32
      - 10.50.250.27/32
      ports:
      - 30000:30999
  # Secure partner API gRPC mTLS
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 127.0.0.1/32
      ports:
      - 50051
  # Payment gateway mTLS
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 127.0.0.1/32
      ports:
      - 8443
  # GitHub APIs
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 140.82.121.6/32
      - 185.199.108.133/32
      - 185.199.109.133/32
      - 185.199.110.133/32
      - 185.199.111.133/32
      ports:
      - 443
  # PostgreSQL database - PRD
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 172.16.20.5/32
      ports:
      - 5432
  # Partner API - Production
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 54.237.57.21/32
      ports:
      - 443
  # default deny
  - action: Deny

apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: python-app-egress
  namespace: python-app-prd
spec:
  selector: app == "python-app"
  types:
  - Egress
  egress:
  - action: Allow
    protocol: UDP
    destination:
      ports:
      - 53
  - action: Allow
    protocol: TCP
    destination:
      ports:
      - 53
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 10.20.30.0/24
      ports:
      - 9092
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 10.50.250.25/32
      - 10.50.250.26/32
      - 10.50.250.27/32
      ports:
      - 30000:30999
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 127.0.0.1/32
      ports:
      - 50051
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 127.0.0.1/32
      ports:
      - 8443
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 140.82.112.6/32
      - 185.199.108.133/32
      - 185.199.109.133/32
      - 185.199.110.133/32
      - 185.199.111.133/32
      ports:
      - 443
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 172.16.20.5/32
      ports:
      - 5432
  - action: Allow
    protocol: TCP
    destination:
      nets:
      - 54.237.57.21/32
      ports:
      - 443
  - action: Deny
